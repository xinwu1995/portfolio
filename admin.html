<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品集管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #10b981;
  --accent-light: #d1fae5;
  --bg: #f4f4f5;
  --surface: #ffffff;
  --border: #e4e4e7;
  --text: #09090b;
  --text-2: #52525b;
  --text-3: #a1a1aa;
  --sidebar-w: 220px;
  --topbar-h: 52px;
  --bottombar-h: 56px;
  --radius: 10px;
}

body {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Topbar ── */
#topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 10;
}
#topbar .logo {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
  flex: 1;
}
#btn-gh-settings {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-2);
  display: flex;
  align-items: center;
  gap: 6px;
  transition: border-color .15s;
}
#btn-gh-settings:hover { border-color: var(--accent); color: var(--accent); }

/* ── Body Layout ── */
#body-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  padding: 16px 16px 8px;
}
.project-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .12s;
}
.project-item:hover { background: var(--bg); }
.project-item.active {
  border-left-color: var(--accent);
  background: #f0fdf8;
}
.project-num {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  flex-shrink: 0;
}
.project-item.active .project-num {
  background: var(--accent-light);
  color: #065f46;
}
.project-name {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Main Editor ── */
#main {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  padding-bottom: calc(var(--bottombar-h) + 24px);
}

#project-title-wrap {
  margin-bottom: 24px;
}
#project-title-wrap label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-3);
  margin-bottom: 6px;
}
#project-title-input {
  width: 100%;
  font-size: 20px;
  font-weight: 700;
  border: none;
  background: none;
  outline: none;
  color: var(--text);
  padding: 4px 0;
  border-bottom: 2px solid var(--border);
  transition: border-color .15s;
  font-family: 'Inter', sans-serif;
}
#project-title-input:focus { border-bottom-color: var(--accent); }

/* ── Block List ── */
#block-list { display: flex; flex-direction: column; gap: 12px; }

.block-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.block-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: #fafafa;
  border-bottom: 1px solid var(--border);
}
.block-type-badge {
  font-size: 11px;
  font-weight: 600;
  background: var(--accent-light);
  color: #065f46;
  border-radius: 4px;
  padding: 2px 7px;
  flex-shrink: 0;
}
.block-title {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.block-controls {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.block-controls button {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
  font-size: 14px;
  transition: all .12s;
}
.block-controls button:hover { border-color: var(--accent); color: var(--accent); background: #f0fdf8; }
.block-controls button.del:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; }
.block-controls button:disabled { opacity: .35; cursor: default; pointer-events: none; }
.block-body { padding: 14px; }

/* ── Form Fields ── */
.field-group { margin-bottom: 12px; }
.field-group:last-child { margin-bottom: 0; }
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 5px;
}
input[type="text"], textarea, select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 10px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color .15s;
  resize: vertical;
}
input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--accent); background: #fff; }
textarea { min-height: 80px; }
select { cursor: pointer; }

/* ── Image Upload Areas ── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  background: var(--bg);
  position: relative;
}
.upload-zone:hover { border-color: var(--accent); background: #f0fdf8; }
.upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.upload-zone-text { font-size: 12px; color: var(--text-3); pointer-events: none; }
.upload-zone-text span { color: var(--accent); font-weight: 500; }
.upload-zone-thumb {
  width: 100%;
  max-height: 120px;
  object-fit: cover;
  border-radius: 6px;
  margin-top: 8px;
  pointer-events: none;
  display: block;
}

/* ── Layout Toggle ── */
.layout-toggle { display: flex; gap: 8px; }
.layout-btn {
  flex: 1;
  padding: 7px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--bg);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  transition: all .12s;
  text-align: center;
  font-family: 'Inter', sans-serif;
}
.layout-btn.active {
  border-color: var(--accent);
  background: var(--accent-light);
  color: #065f46;
}
.layout-btn:hover { border-color: var(--accent); }

/* ── Video Toggle ── */
.video-type-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
.video-type-btn {
  flex: 1;
  padding: 7px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--bg);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  transition: all .12s;
  text-align: center;
  font-family: 'Inter', sans-serif;
}
.video-type-btn.active {
  border-color: var(--accent);
  background: var(--accent-light);
  color: #065f46;
}
.video-type-btn:hover { border-color: var(--accent); }

/* ── Multi-image items ── */
.multi-img-item {
  background: #fafafa;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 8px;
}
.multi-img-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.multi-img-thumb {
  width: 64px;
  height: 48px;
  border-radius: 5px;
  overflow: hidden;
  flex-shrink: 0;
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text-3);
}
.multi-img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.multi-img-upload-label {
  font-size: 12px;
  color: var(--accent);
  cursor: pointer;
  font-weight: 500;
  flex: 1;
}
.multi-img-remove {
  width: 24px;
  height: 24px;
  border: none;
  background: none;
  cursor: pointer;
  color: var(--text-3);
  font-size: 16px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
}
.multi-img-remove:hover { color: #ef4444; background: #fef2f2; }

/* ── Add Block Area ── */
#add-block-area { margin-top: 16px; }
#btn-add-block-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  background: none;
  cursor: pointer;
  color: var(--text-3);
  font-size: 13px;
  font-weight: 500;
  width: 100%;
  transition: all .15s;
  font-family: 'Inter', sans-serif;
}
#btn-add-block-toggle:hover { border-color: var(--accent); color: var(--accent); background: #f0fdf8; }
#add-block-menu {
  display: none;
  margin-top: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
#add-block-menu.open { display: grid; }
.add-type-btn {
  padding: 10px 6px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  text-align: center;
  transition: all .12s;
  font-family: 'Inter', sans-serif;
}
.add-type-btn:hover { border-color: var(--accent); background: var(--accent-light); color: #065f46; }

/* ── Bottombar ── */
#bottombar {
  position: fixed;
  bottom: 0;
  left: var(--sidebar-w);
  right: 0;
  height: var(--bottombar-h);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 10px;
  z-index: 10;
}
#status-msg {
  flex: 1;
  font-size: 13px;
  color: var(--text-3);
}
#status-msg.ok { color: var(--accent); font-weight: 500; }
#status-msg.err { color: #ef4444; font-weight: 500; }
.btn-secondary {
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-2);
  transition: all .15s;
  font-family: 'Inter', sans-serif;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary {
  padding: 8px 20px;
  border: none;
  border-radius: 8px;
  background: var(--text);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  font-family: 'Inter', sans-serif;
}
.btn-primary:hover { background: #27272a; }
.btn-primary:disabled { background: #a1a1aa; cursor: not-allowed; }

/* ── GitHub Config Modal ── */
#modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--surface);
  border-radius: 16px;
  padding: 28px;
  width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
}
#modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
#modal .modal-sub { font-size: 13px; color: var(--text-2); margin-bottom: 20px; line-height: 1.6; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ── Empty State ── */
#empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: var(--text-3);
  font-size: 14px;
  gap: 12px;
}
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <div class="logo">作品集管理</div>
  <button id="btn-gh-settings">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    GitHub 设置
  </button>
</div>

<!-- Body -->
<div id="body-wrap">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-label">项目列表</div>
    <div id="project-list"></div>
  </div>

  <!-- Main Editor -->
  <div id="main">
    <div id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
      <span>从左侧选择一个项目开始编辑</span>
    </div>
    <div id="editor-area" style="display:none">
      <div id="project-title-wrap">
        <label>项目名称</label>
        <input type="text" id="project-title-input" placeholder="输入项目标题">
      </div>
      <div id="block-list"></div>
      <div id="add-block-area">
        <button id="btn-add-block-toggle">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 1v12M1 7h12"/></svg>
          添加内容块
        </button>
        <div id="add-block-menu">
          <button class="add-type-btn" data-type="text">文本</button>
          <button class="add-type-btn" data-type="image-single">单图</button>
          <button class="add-type-btn" data-type="image-carousel">轮播图</button>
          <button class="add-type-btn" data-type="image-stack">堆叠图</button>
          <button class="add-type-btn" data-type="image-text">图文</button>
          <button class="add-type-btn" data-type="video">视频</button>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- Bottombar -->
<div id="bottombar">
  <span id="status-msg"></span>
  <button class="btn-secondary" id="btn-preview">预览</button>
  <button class="btn-primary" id="btn-publish">发布</button>
</div>

<!-- GitHub Config Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>GitHub 配置</h2>
    <p class="modal-sub">填写后可将项目内容发布到 GitHub Pages。<br>Token 仅存储在本地浏览器，不会上传。</p>
    <div class="modal-field">
      <label>GitHub 用户名</label>
      <input type="text" id="gh-owner" placeholder="例：octocat">
    </div>
    <div class="modal-field">
      <label>仓库名</label>
      <input type="text" id="gh-repo" placeholder="例：portfolio">
    </div>
    <div class="modal-field">
      <label>Personal Access Token（需要 contents:write 权限）</label>
      <input type="text" id="gh-token" placeholder="ghp_xxxxxxxxxxxx">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-modal-cancel">取消</button>
      <button class="btn-primary" id="btn-modal-save">保存</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// State
// ─────────────────────────────────────────
const CONFIG_KEY = 'portfolio_gh_config';
let config = { owner: '', repo: '', token: '' };
let projects = [];
let currentId = null;
let currentData = null;

// pendingUploads: keyed by "block_{idx}_{field}" or "block_{idx}_carousel_{imgIdx}" etc.
// value: { base64, filename, targetPath }
let pendingUploads = {};

// ─────────────────────────────────────────
// Config
// ─────────────────────────────────────────
function loadConfig() {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if (raw) config = JSON.parse(raw);
  } catch(e) {}
}

function saveConfig() {
  config.owner = document.getElementById('gh-owner').value.trim();
  config.repo  = document.getElementById('gh-repo').value.trim();
  config.token = document.getElementById('gh-token').value.trim();
  localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
  closeModal();
  setStatus('GitHub 配置已保存', 'ok');
  setTimeout(() => setStatus('', ''), 2000);
}

// ─────────────────────────────────────────
// Modal
// ─────────────────────────────────────────
function openModal() {
  document.getElementById('gh-owner').value = config.owner || '';
  document.getElementById('gh-repo').value  = config.repo  || '';
  document.getElementById('gh-token').value = config.token || '';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─────────────────────────────────────────
// GitHub API
// ─────────────────────────────────────────
async function ghGet(path) {
  const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`;
  const res = await fetch(url, {
    headers: { Authorization: `token ${config.token}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`GET ${path} → ${res.status}`);
  return res.json();
}

async function ghPut(path, base64Content, message) {
  const url = `https://api.github.com/repos/${config.owner}/${config.repo}/contents/${path}`;
  let sha;
  try {
    const existing = await ghGet(path);
    sha = existing.sha;
  } catch(e) { /* new file */ }

  const body = { message, content: base64Content };
  if (sha) body.sha = sha;

  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      Authorization: `token ${config.token}`,
      'Content-Type': 'application/json',
      Accept: 'application/vnd.github.v3+json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(`PUT ${path} → ${err.message || res.status}`);
  }
  return res.json();
}

function textToBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

// ─────────────────────────────────────────
// Load project list
// ─────────────────────────────────────────
async function loadProjects() {
  try {
    const res = await fetch('data/projects.json?_=' + Date.now());
    if (res.ok) projects = await res.json();
    else throw new Error('not ok');
  } catch(e) {
    projects = [1,2,3,4].map(i => ({ id:i, title:`项目 ${i}`, type:'', year:'', desc:'', thumb:'' }));
  }
  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('project-list');
  list.innerHTML = '';
  projects.forEach(p => {
    const item = document.createElement('div');
    item.className = 'project-item' + (p.id === currentId ? ' active' : '');
    const num = document.createElement('div');
    num.className = 'project-num';
    num.textContent = p.id;
    const name = document.createElement('div');
    name.className = 'project-name';
    name.textContent = p.title;
    item.appendChild(num);
    item.appendChild(name);
    item.addEventListener('click', () => selectProject(p.id));
    list.appendChild(item);
  });
}

// ─────────────────────────────────────────
// Select project
// ─────────────────────────────────────────
async function selectProject(id) {
  currentId = id;
  pendingUploads = {};
  getPreviewChannel(id);  // 初始化/切换 BroadcastChannel
  renderSidebar();
  setStatus('加载中…', '');

  // 优先从 localStorage 读（刷新后恢复未发布的编辑内容）
  const cached = localStorage.getItem('portfolio_preview_' + id);
  if (cached) {
    try { currentData = JSON.parse(cached); } catch(e) { currentData = null; }
  }
  if (!currentData) {
    try {
      const res = await fetch(`data/project-${id}.json?_=` + Date.now());
      currentData = res.ok ? await res.json() : { id, title: projects.find(p=>p.id===id)?.title||`项目 ${id}`, blocks: [] };
    } catch(e) {
      currentData = { id, title: `项目 ${id}`, blocks: [] };
    }
  }

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('editor-area').style.display = 'block';
  document.getElementById('project-title-input').value = currentData.title || '';
  renderBlockList();
  setStatus('', '');
}

// ─────────────────────────────────────────
// Block list
// ─────────────────────────────────────────
const TYPE_LABELS = {
  heading:'标题', body:'正文', quote:'引言', text:'文本',
  'image-single':'单图', 'image-carousel':'轮播图',
  'image-stack':'堆叠图', 'image-text':'图文', video:'视频'
};

// ─────────────────────────────────────────
// Auto-save + BroadcastChannel 实时预览
// ─────────────────────────────────────────
let previewChannel = null;  // 当前项目的 BroadcastChannel

function getPreviewChannel(id) {
  if (previewChannel) previewChannel.close();
  previewChannel = new BroadcastChannel('portfolio_preview_' + id);
  // 预览页打开时会发 request，admin 立刻回送当前数据
  previewChannel.addEventListener('message', e => {
    if (e.data && e.data.type === 'request') broadcastPreview();
  });
  return previewChannel;
}

function broadcastPreview() {
  if (!currentId || !currentData || !previewChannel) return;
  previewChannel.postMessage({ type: 'data', data: currentData });
}

let autosaveTimer = null;
function autosave() {
  if (!currentId || !currentData) return;
  // 立刻广播给预览页（含图片 data URL）
  broadcastPreview();
  // 延迟存 localStorage（仅文字，图片大时会静默失败）
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    try {
      localStorage.setItem('portfolio_preview_' + currentId, JSON.stringify(currentData));
    } catch(e) { /* storage full, ok */ }
  }, 500);
}

function renderBlockList() {
  const list = document.getElementById('block-list');
  list.innerHTML = '';
  (currentData.blocks || []).forEach((block, idx) => list.appendChild(buildBlockItem(block, idx)));
  autosave();
}

function getBlockPreview(block) {
  switch(block.type) {
    case 'heading':
    case 'body':
    case 'quote':   return (block.content||'').slice(0,40) || '（空）';
    case 'image-single':   return block.src ? '已选择图片' : '未选择';
    case 'image-carousel': return `${(block.images||[]).length} 张`;
    case 'image-stack':    return `${(block.images||[]).length} 张`;
    case 'image-text':     return block.image ? '已选择图片' : '未选择';
    case 'video': return block.videoType==='embed' ? (block.url||'').slice(0,40)||'未填链接' : (block.src?'已选择文件':'未选择');
    default: return '';
  }
}

function buildBlockItem(block, idx) {
  const total = currentData.blocks.length;
  const item = document.createElement('div');
  item.className = 'block-item';

  // Header
  const header = document.createElement('div');
  header.className = 'block-header';

  const badge = document.createElement('span');
  badge.className = 'block-type-badge';
  badge.textContent = TYPE_LABELS[block.type] || block.type;

  const title = document.createElement('span');
  title.className = 'block-title';
  title.textContent = getBlockPreview(block);

  const controls = document.createElement('div');
  controls.className = 'block-controls';

  const btnUp = document.createElement('button');
  btnUp.textContent = '↑'; btnUp.title = '上移';
  if (idx === 0) btnUp.disabled = true;
  btnUp.addEventListener('click', () => {
    [currentData.blocks[idx-1], currentData.blocks[idx]] = [currentData.blocks[idx], currentData.blocks[idx-1]];
    renderBlockList();
  });

  const btnDown = document.createElement('button');
  btnDown.textContent = '↓'; btnDown.title = '下移';
  if (idx === total-1) btnDown.disabled = true;
  btnDown.addEventListener('click', () => {
    [currentData.blocks[idx], currentData.blocks[idx+1]] = [currentData.blocks[idx+1], currentData.blocks[idx]];
    renderBlockList();
  });

  const btnDel = document.createElement('button');
  btnDel.textContent = '×'; btnDel.title = '删除'; btnDel.className = 'del';
  btnDel.addEventListener('click', () => {
    currentData.blocks.splice(idx, 1);
    renderBlockList();
  });

  const btnAdd = document.createElement('button');
  btnAdd.textContent = '+'; btnAdd.title = '在此块后面添加';
  btnAdd.style.cssText = 'position:relative;';
  btnAdd.addEventListener('click', e => {
    e.stopPropagation();
    // Remove any existing inline menus
    document.querySelectorAll('.inline-add-menu').forEach(m => m.remove());
    const menu = document.createElement('div');
    menu.className = 'inline-add-menu';
    menu.style.cssText = 'position:absolute;top:32px;right:0;background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:50;width:260px;box-shadow:0 8px 24px rgba(0,0,0,.1);';
    ['text','image-single','image-carousel','image-stack','image-text','video'].forEach(type => {
      const t = document.createElement('button');
      t.className = 'add-type-btn';
      t.style.cssText = 'font-size:11px;padding:7px 4px;';
      t.textContent = TYPE_LABELS[type];
      t.addEventListener('click', e2 => {
        e2.stopPropagation();
        const block = newBlock(type);
        currentData.blocks.splice(idx + 1, 0, block);
        menu.remove();
        renderBlockList();
        // Scroll new block into view
        setTimeout(() => {
          const items = document.querySelectorAll('.block-item');
          if (items[idx + 1]) items[idx + 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 50);
      });
      menu.appendChild(t);
    });
    btnAdd.appendChild(menu);
    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', () => menu.remove(), { once: true });
    }, 0);
  });

  controls.appendChild(btnAdd);
  controls.appendChild(btnUp);
  controls.appendChild(btnDown);
  controls.appendChild(btnDel);
  header.appendChild(badge);
  header.appendChild(title);
  header.appendChild(controls);

  // Body
  const body = document.createElement('div');
  body.className = 'block-body';
  body.appendChild(buildBlockFields(block, idx));

  item.appendChild(header);
  item.appendChild(body);
  return item;
}

// ─────────────────────────────────────────
// Block field builders
// ─────────────────────────────────────────
function buildBlockFields(block, idx) {
  const wrap = document.createElement('div');
  switch(block.type) {
    case 'heading':
    case 'body':
    case 'quote':          wrap.appendChild(buildTextFields(block)); break;
    case 'image-single':   wrap.appendChild(buildImageSingleFields(block, idx)); break;
    case 'image-carousel': wrap.appendChild(buildImageCarouselFields(block, idx)); break;
    case 'image-stack':    wrap.appendChild(buildImageStackFields(block, idx)); break;
    case 'image-text':     wrap.appendChild(buildImageTextField(block, idx)); break;
    case 'video':          wrap.appendChild(buildVideoFields(block, idx)); break;
  }
  return wrap;
}

function fieldGroup(labelText, inputEl) {
  const g = document.createElement('div');
  g.className = 'field-group';
  if (labelText) {
    const lbl = document.createElement('label');
    lbl.className = 'field-label';
    lbl.textContent = labelText;
    g.appendChild(lbl);
  }
  g.appendChild(inputEl);
  return g;
}

function makeInput(placeholder, value, onChange) {
  const el = document.createElement('input');
  el.type = 'text'; el.placeholder = placeholder; el.value = value || '';
  el.addEventListener('input', () => onChange(el.value));
  return el;
}

function makeTextarea(placeholder, value, rows, onChange) {
  const el = document.createElement('textarea');
  el.placeholder = placeholder; el.value = value || ''; el.rows = rows || 5;
  el.addEventListener('input', () => onChange(el.value));
  return el;
}

// 统一文本块（heading / body / quote 共用）
function buildTextFields(block) {
  const frag = document.createDocumentFragment();

  // 样式下拉：决定 type + level
  function currentStyle() {
    if (block.type === 'heading') return 'h' + (block.level || 2);
    return block.type; // 'body' | 'quote'
  }

  const sel = document.createElement('select');
  [
    ['h1','H1 一级标题'], ['h2','H2 二级标题'], ['h3','H3 三级标题'],
    ['body','正文'], ['quote','引言']
  ].forEach(([v, t]) => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = t;
    if (currentStyle() === v) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    const v = sel.value;
    if (v.startsWith('h')) {
      block.type = 'heading';
      block.level = parseInt(v[1]);
    } else {
      block.type = v; // 'body' | 'quote'
      delete block.level;
    }
    autosave();
  });
  frag.appendChild(fieldGroup('样式', sel));

  // 内容 textarea（统一支持换行）
  const ta = document.createElement('textarea');
  ta.value = block.content || '';
  ta.placeholder = '输入内容，支持换行';
  ta.rows = 4;
  ta.addEventListener('input', () => { block.content = ta.value; autosave(); });
  frag.appendChild(fieldGroup('内容', ta));
  return frag;
}

// image-single
function buildImageSingleFields(block, idx) {
  const frag = document.createDocumentFragment();
  frag.appendChild(fieldGroup('图片', buildSingleImageUpload(block, idx, 'src')));
  frag.appendChild(fieldGroup('图片说明（可选）', makeInput('图片说明文字', block.caption, v => { block.caption = v; })));
  return frag;
}

// image-carousel
function buildImageCarouselFields(block, idx) {
  if (!block.images) block.images = [];
  if (!block.captions) block.captions = [];

  const wrap = document.createElement('div');
  const lbl = document.createElement('label');
  lbl.className = 'field-label';
  lbl.textContent = '轮播图片';
  wrap.appendChild(lbl);

  const listWrap = document.createElement('div');

  function render() {
    listWrap.innerHTML = '';
    block.images.forEach((src, imgIdx) => {
      const item = document.createElement('div');
      item.className = 'multi-img-item';

      const row = document.createElement('div');
      row.className = 'multi-img-row';

      const thumb = document.createElement('div');
      thumb.className = 'multi-img-thumb';
      if (src) { const img = document.createElement('img'); img.src = src; thumb.appendChild(img); }
      else thumb.textContent = '未选';

      const uploadLbl = document.createElement('label');
      uploadLbl.className = 'multi-img-upload-label';
      uploadLbl.textContent = src ? '重新上传' : '选择图片';
      const fi = document.createElement('input');
      fi.type = 'file'; fi.accept = 'image/*'; fi.style.display = 'none';
      fi.addEventListener('change', () => {
        const file = fi.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          const b64 = e.target.result.split(',')[1];
          const ext = file.name.split('.').pop();
          const fname = `p${currentId}-carousel-b${idx}-${imgIdx}-${Date.now()}.${ext}`;
          pendingUploads[`block_${idx}_carousel_${imgIdx}`] = { base64: b64, filename: fname, targetPath: `assets/images/projects/${fname}` };
          block.images[imgIdx] = e.target.result;
          block.captions[imgIdx] = block.captions[imgIdx] || '';
          render();
        };
        reader.readAsDataURL(file);
      });
      uploadLbl.appendChild(fi);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'multi-img-remove';
      removeBtn.textContent = '×'; removeBtn.title = '删除';
      removeBtn.addEventListener('click', () => {
        block.images.splice(imgIdx, 1);
        block.captions.splice(imgIdx, 1);
        delete pendingUploads[`block_${idx}_carousel_${imgIdx}`];
        render();
      });

      row.appendChild(thumb); row.appendChild(uploadLbl); row.appendChild(removeBtn);

      const capInput = makeInput('图片说明（可选）', block.captions[imgIdx], v => { block.captions[imgIdx] = v; });
      item.appendChild(row); item.appendChild(capInput);
      listWrap.appendChild(item);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'btn-secondary';
    addBtn.textContent = '+ 添加图片';
    addBtn.style.cssText = 'font-size:12px;padding:6px 14px;';
    addBtn.addEventListener('click', () => { block.images.push(''); block.captions.push(''); render(); });
    listWrap.appendChild(addBtn);
  }

  render();
  wrap.appendChild(listWrap);
  return wrap;
}

// image-text
function buildImageTextField(block, idx) {
  const frag = document.createDocumentFragment();

  // Layout toggle
  const layoutGroup = document.createElement('div');
  layoutGroup.className = 'field-group';
  const layoutLbl = document.createElement('label');
  layoutLbl.className = 'field-label';
  layoutLbl.textContent = '图片位置';

  toggleWrap.className = 'layout-toggle';

  });

// video
function buildVideoFields(block, idx) {
  if (!block.videoType) block.videoType = 'embed';
  const frag = document.createDocumentFragment();

  const toggle = document.createElement('div');
  toggle.className = 'video-type-toggle';
  const fieldsWrap = document.createElement('div');

  ['embed','upload'].forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'video-type-btn' + (block.videoType === v ? ' active' : '');

      block.videoType = v;

  fieldsWrap.appendChild(buildVideoTypeFields(block, idx));

function buildVideoTypeFields(block, idx) {
  const frag = document.createDocumentFragment();
  if (block.videoType === 'embed') {
    frag.appendChild(fieldGroup(
      '视频链接（B站/YouTube）',
      makeInput('https://www.bilibili.com/video/...', block.url, v => { block.url = v; delete block.src; })
    ));
  } else {
    const zone = document.createElement('div');
    zone.className = 'upload-zone';
    const fi = document.createElement('input');
    fi.type = 'file'; fi.accept = 'video/*';
    const text = document.createElement('div');
    text.className = 'upload-zone-text';

    const pendingKey = `block_${idx}_video`;
    if (block.src && !block.src.startsWith('data:')) {
      text.innerHTML = `当前：<span>${block.src.split('/').pop()}</span>（点击重新选择）`;
    } else if (pendingUploads[pendingKey]) {
      text.innerHTML = `已选择：<span>${pendingUploads[pendingKey].filename}</span>（点击重新选择）`;
    } else {
      text.innerHTML = '点击选择视频文件';
    }

    fi.addEventListener('change', () => {
      const file = fi.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const b64 = e.target.result.split(',')[1];
        const ext = file.name.split('.').pop();
        const fname = `p${currentId}-video-b${idx}-${Date.now()}.${ext}`;
        pendingUploads[pendingKey] = { base64: b64, filename: fname, targetPath: `assets/videos/${fname}` };
        block.src = `assets/videos/${fname}`;
        delete block.url;
        text.innerHTML = `已选择：<span>${fname}</span>（点击重新选择）`;
      };
      reader.readAsDataURL(file);
    });

    zone.appendChild(fi); zone.appendChild(text);
    frag.appendChild(fieldGroup('视频文件', zone));
  }
  return frag;
}

// Single image upload (for image-single.src and image-text.image)
function buildSingleImageUpload(block, blockIdx, field) {
  const zone = document.createElement('div');
  zone.className = 'upload-zone';

  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = 'image/*';

  const text = document.createElement('div');
  text.className = 'upload-zone-text';

  let thumb = null;

  function updateUI() {
    const src = block[field];
    if (src && src.startsWith('data:')) {
      text.innerHTML = '已选择图片 <span>（点击重新上传）</span>';
      if (!thumb) {
        thumb = document.createElement('img');
        thumb.className = 'upload-zone-thumb';
        zone.appendChild(thumb);
      }
      thumb.src = src;
    } else if (src) {
      text.innerHTML = `当前：<span>${src.split('/').pop()}</span>（点击重新上传）`;
      if (thumb) { thumb.remove(); thumb = null; }
    } else {
      text.innerHTML = '点击选择图片 <span>或拖入文件</span>';
      if (thumb) { thumb.remove(); thumb = null; }
    }
  }

  fi.addEventListener('change', () => {
    const file = fi.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const b64 = e.target.result.split(',')[1];
      const ext = file.name.split('.').pop();
      const fname = `p${currentId}-${field}-b${blockIdx}-${Date.now()}.${ext}`;
      const targetPath = `assets/images/projects/${fname}`;
      pendingUploads[`block_${blockIdx}_${field}`] = { base64: b64, filename: fname, targetPath };
      block[field] = e.target.result;
      updateUI();
    };
    reader.readAsDataURL(file);
  });

  zone.appendChild(fi);
  zone.appendChild(text);
  updateUI();
  return zone;
}

// ─────────────────────────────────────────
// New block defaults
// ─────────────────────────────────────────
function newBlock(type) {
  const id = 'b' + Date.now();
  switch(type) {
    case 'text':           return { id, type: 'body', content: '' };
    case 'heading':        return { id, type, level: 2, content: '' };
    case 'body':           return { id, type, content: '' };
    case 'quote':          return { id, type, content: '' };
    case 'image-single':   return { id, type, src: '', caption: '' };
    case 'image-carousel': return { id, type, images: [], captions: [] };
    case 'image-stack':    return { id, type, images: [] };
    case 'image-text':     return { id, type, layout: 'left', image: '', caption: '', text: '' };
    case 'video':          return { id, type, videoType: 'embed', url: '' };
    default: return { id, type };
  }
}

// ─────────────────────────────────────────
// Status

function setStatus(msg, cls) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = cls || '';
}

// ─────────────────────────────────────────
// Collect form data
// ─────────────────────────────────────────
function collectData() {
  currentData.title = document.getElementById('project-title-input').value.trim() || `项目 ${currentId}`;
  // blocks are mutated in-place by event listeners
}

// ─────────────────────────────────────────
// Replace data URLs with real paths after upload
// ─────────────────────────────────────────
function updateBlockImagePath(key, realPath) {
  // key: block_{idx}_{field|carousel_imgIdx|stack_imgIdx|video}
  const parts = key.split('_');  // ["block", idx, ...]
  const bIdx = parseInt(parts[1]);
  const block = currentData.blocks[bIdx];
  if (!block) return;

  if (parts[2] === 'carousel') {
    const imgIdx = parseInt(parts[3]);
    if (block.images) block.images[imgIdx] = realPath;
  } else if (parts[2] === 'stack') {
    const imgIdx = parseInt(parts[3]);
    if (block.images) block.images[imgIdx] = realPath;
  } else if (parts[2] === 'video') {
    block.src = realPath;
  } else {
    block[parts[2]] = realPath; // 'src' or 'image'
  }
}

// ─────────────────────────────────────────
// Publish
// ─────────────────────────────────────────
async function publishProject() {
  if (!config.owner || !config.repo || !config.token) {
    openModal();
    return;
  }
  if (!currentId) { setStatus('请先选择一个项目', 'err'); return; }

  collectData();

  const btn = document.getElementById('btn-publish');
  btn.disabled = true;
  setStatus('准备发布…', '');

  try {
    // 1. Upload pending files
    const uploadKeys = Object.keys(pendingUploads);
    for (let i = 0; i < uploadKeys.length; i++) {
      const key = uploadKeys[i];
      const up = pendingUploads[key];
      setStatus(`上传文件 ${i+1} / ${uploadKeys.length}：${up.filename}`, '');
      await ghPut(up.targetPath, up.base64, `upload ${up.filename}`);
      updateBlockImagePath(key, up.targetPath);
    }
    pendingUploads = {};

    // 2. Write project-N.json
    setStatus('写入项目数据…', '');
    await ghPut(`data/project-${currentId}.json`, textToBase64(JSON.stringify(currentData, null, 2)), `update project-${currentId}`);

    // 3. Update projects.json
    setStatus('更新项目列表…', '');
    const proj = projects.find(p => p.id === currentId);
    if (proj) proj.title = currentData.title;
    else projects.push({ id: currentId, title: currentData.title, type: '', year: '', desc: '', thumb: '' });
    await ghPut('data/projects.json', textToBase64(JSON.stringify(projects, null, 2)), 'update projects.json');

    setStatus('发布成功 ✓ 约 1-2 分钟后生效', 'ok');
    renderSidebar();
  } catch(e) {
    setStatus('发布失败：' + e.message, 'err');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────
// Event bindings
// ─────────────────────────────────────────
document.getElementById('btn-gh-settings').addEventListener('click', openModal);
document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
document.getElementById('btn-modal-save').addEventListener('click', saveConfig);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.getElementById('btn-add-block-toggle').addEventListener('click', () => {
  document.getElementById('add-block-menu').classList.toggle('open');
});

document.querySelectorAll('.add-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!currentData) return;
    const block = newBlock(btn.dataset.type);
    currentData.blocks.push(block);
    document.getElementById('add-block-menu').classList.remove('open');
    renderBlockList();
    // Scroll new block into view
    const items = document.querySelectorAll('.block-item');
    if (items.length) items[items.length-1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
});

document.getElementById('project-title-input').addEventListener('input', () => {
  if (currentData) { currentData.title = document.getElementById('project-title-input').value.trim() || `项目 ${currentId}`; autosave(); }
});

document.getElementById('btn-preview').addEventListener('click', () => {
  if (!currentId) return;
  collectData();
  autosave();
  window.open(`project.html?id=${currentId}&preview=1`, '_blank');
});

document.getElementById('btn-publish').addEventListener('click', publishProject);

// ─────────────────────────────────────────
// Init
// ─────────────────────────────────────────
loadConfig();
loadProjects();
if (!config.owner || !config.repo || !config.token) {
  setTimeout(openModal, 400);
}
</script>
</body>
</html>
